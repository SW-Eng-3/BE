spring:
  application:
    name: backend
  profiles:
    active: local
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.naver.com
    port: 465
    username: ${NAVER_EMAIL}
    password: ${NAVER_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
            trust: smtp.naver.com
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
            port: 465

springdoc:
  swagger-ui:
    path: /SWENG3-docs
    groups-order: asc
    operations-sorter: method
    disable-swagger-default-url: true
    display-operation-id: false
  api-docs:
    path: /SWENG3-api-docs

custom:
  env-name: "Base Environment"
  debug-mode: false
