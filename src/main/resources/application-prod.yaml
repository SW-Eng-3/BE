spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true

springdoc:
  swagger-ui:
    path: /SWENG3-docs
    groups-order: asc
    operations-sorter: method
    disable-swagger-default-url: true
    display-operation-id: false
  api-docs:
    path: /SWENG3-api-docs

custom:
  env-name: "Deploy Mode (Supabase)"
  debug-mode: false
